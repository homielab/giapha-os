name: PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  size-check:
    name: PR Size Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check PR size
        run: |
          FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD | wc -l)
          LINES=$(git diff origin/${{ github.base_ref }}...HEAD | wc -l)
          echo "Files changed: $FILES"
          echo "Lines changed: $LINES"
          if [ "$FILES" -gt 30 ]; then
            echo "⚠️ Large PR: $FILES files changed. Consider splitting."
          fi

  build-check:
    name: Build Verification
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit
        continue-on-error: true

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || 'https://placeholder.supabase.co' }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || 'placeholder-anon-key' }}

      - name: Build success comment
        if: success()
        run: echo "✅ Build passed successfully"

      - name: Build failure comment
        if: failure()
        run: echo "❌ Build failed - please fix errors before merging"
